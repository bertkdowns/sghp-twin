# Basic mosquitto configuration for the SGHP digital twin
listener 1883 0.0.0.0
protocol mqtt

# Websockets listener (optional)
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log
log_type all

# Password file (create with mosquitto_passwd)
password_file /mosquitto/config/passwordfile

# Allow anonymous by default for development; to require auth, set to false.
allow_anonymous true

# Keep the default persistence interval
# persistence_interval 15
